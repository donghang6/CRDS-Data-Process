# ============================================================
# CRDS Data Process - 默认实验配置
# ============================================================

# --- 光腔参数 ---
cavity:
  length_cm: 42.0              # 腔长 (cm)
  mirror_reflectivity: 0.99997 # 镜面反射率

# --- 衰荡时间处理 ---
ringdown:
  # 离群值过滤方法: "sigma_clip" 或 "iqr"
  filter_method: "sigma_clip"
  sigma_clip_threshold: 3.0     # sigma-clip 阈值
  iqr_factor: 1.5               # IQR 因子
  min_events_per_point: 10      # 每个波数点最少衰荡事件数

# --- 基线拟合 ---
baseline:
  method: "polynomial"          # "polynomial" 或 "spline"
  poly_order: 3                 # 多项式阶数
  spline_smoothing: 1.0e-6      # 样条平滑因子
  # 基线区域（无吸收峰的波数范围），可指定多段
  regions:
    - [9290.05, 9290.10]
    - [9290.55, 9290.60]

# --- 吸收系数计算 ---
absorption:
  speed_of_light_cm_s: 2.99792458e10  # 光速 (cm/s)
  tau0_us: 90.5                        # 空腔衰荡时间 (μs)，如果有专门的空腔测量则从文件读取

# --- 气体条件 ---
gas:
  species: "H2O"
  temperature_K: 296.0
  pressure_torr: 30.0
  isotopologue: 1               # HITRAN 同位素编号

# --- MATS 拟合参数 ---
mats:
  database: "HITRAN"
  wavenumber_range: [9290.0, 9290.6]
  fit_parameters:
    - "nu"                      # 线位置
    - "sw"                      # 线强
    - "gamma_self"              # 自展宽系数
    - "gamma_air"               # 空气展宽系数
    - "delta_air"               # 空气频移
    - "n_air"                   # 温度依赖指数
  max_iterations: 100
  convergence_threshold: 1.0e-8

# --- 输入输出路径 ---
paths:
  raw_data_dir: "data/raw"
  processed_dir: "data/processed"
  output_dir: "output"
  figures_dir: "output/figures"
  results_dir: "output/results"

